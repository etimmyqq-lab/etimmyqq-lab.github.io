<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}｜{{AUTHOR_NAME}}</title>
<meta name="description" content="{{DESCRIPTION}}">
<meta name="author" content="{{AUTHOR_NAME}}">
<link rel="canonical" href="{{CANONICAL}}">

<!-- Open Graph -->
<meta property="og:type" content="article">
<meta property="og:locale" content="zh_TW">
<meta property="og:title" content="{{TITLE}}">
<meta property="og:description" content="{{DESCRIPTION}}">
<meta property="article:author" content="{{AUTHOR_NAME}}">
<meta property="article:published_time" content="{{DATE_ISO}}">
<meta property="og:site_name" content="{{AUTHOR_NAME}}">

<!-- schema.org BlogPosting JSON-LD（比 Article 更精準） -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": "{{TITLE_ESCAPED}}",
  "description": "{{DESCRIPTION_ESCAPED}}",
  "author": {
    "@type": "Person",
    "name": "{{AUTHOR_NAME}}",
    "url": "{{AUTHOR_URL}}"{{AUTHOR_WIKIDATA_BLOCK}}
  },
  "publisher": {
    "@type": "Person",
    "name": "{{AUTHOR_NAME}}"
  },
  "datePublished": "{{DATE_ISO}}",
  "dateModified": "{{DATE_ISO}}",
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{CANONICAL}}"
  },
  "keywords": "{{KEYWORDS}}",
  "inLanguage": "zh-Hant",
  "articleSection": "{{CATEGORY}}"
}
</script>

<!-- schema.org BreadcrumbList -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {"@type": "ListItem", "position": 1, "name": "首頁", "item": "{{BASE_URL}}/"},
    {"@type": "ListItem", "position": 2, "name": "文章", "item": "{{BASE_URL}}/#articles"},
    {"@type": "ListItem", "position": 3, "name": "{{TITLE_ESCAPED}}"}
  ]
}
</script>

<link rel="stylesheet" href="../assets/style.css">
<!-- Font optimization: preload critical weights, use display=swap -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@700&display=swap">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">

<style>
    /* 文章頁專用樣式 */
    .article-hero {
        padding: 80px 0 40px;
        background: linear-gradient(135deg, #f8fafd 0%, #eef3f9 100%);
    }
    .article-meta-top {
        color: #C9A96E;
        font-size: 0.9rem;
        letter-spacing: 0.12em;
        margin-bottom: 12px;
    }
    .article-title {
        font-family: 'Noto Serif TC', serif;
        font-size: clamp(1.8rem, 3.6vw, 2.8rem);
        color: #15395a;
        line-height: 1.4;
        margin: 0;
    }
    .article-body {
        max-width: 740px;
        margin: 0 auto;
        padding: 60px 24px 80px;
        font-size: 1.05rem;
        line-height: 1.9;
        color: #4a5568;
    }
    .article-body h2 {
        font-family: 'Noto Serif TC', serif;
        font-size: 1.5rem;
        color: #1F4E79;
        margin: 48px 0 20px;
        padding-left: 14px;
        border-left: 4px solid #C9A96E;
    }
    .article-body h3 {
        font-family: 'Noto Serif TC', serif;
        font-size: 1.2rem;
        color: #1F4E79;
        margin: 32px 0 16px;
    }
    .article-body p { margin: 0 0 20px; }
    .article-body ul, .article-body ol { padding-left: 24px; margin: 0 0 20px; }
    .article-body li { margin-bottom: 8px; }
    .article-body strong { color: #1F4E79; font-weight: 600; }
    .article-body blockquote {
        margin: 28px 0;
        padding: 18px 24px;
        background: #f6f8fb;
        border-left: 4px solid #1F4E79;
        color: #1a2233;
        font-style: italic;
    }
    .article-footer {
        max-width: 740px;
        margin: 0 auto;
        padding: 24px;
        border-top: 1px solid #e4e8ef;
    }
    .article-footer-bio {
        background: #f6f8fb;
        padding: 20px;
        border-radius: 12px;
        font-size: 0.95rem;
        color: #4a5568;
    }
    .article-extras {
        max-width: 740px;
        margin: 0 auto;
        padding: 24px;
    }
    .faq-section h2 {
        font-family: 'Noto Serif TC', serif;
        font-size: 1.4rem;
        color: #1F4E79;
        margin: 24px 0 16px;
        padding-left: 14px;
        border-left: 4px solid #C9A96E;
    }
    .faq-item {
        background: #f6f8fb;
        border-radius: 12px;
        padding: 14px 18px;
        margin-bottom: 10px;
    }
    .faq-item summary {
        cursor: pointer;
        font-weight: 500;
        color: #1a2233;
        padding: 4px 0;
    }
    .faq-item summary::before { content: "▸ "; color: #C9A96E; }
    .faq-item[open] summary::before { content: "▾ "; }
    .faq-answer { margin-top: 10px; color: #4a5568; line-height: 1.8; }
    .related-section {
        margin-top: 40px;
        padding: 20px;
        background: #f8fafd;
        border-radius: 12px;
    }
    .related-section h3 {
        font-family: 'Noto Serif TC', serif;
        color: #1F4E79;
        font-size: 1.1rem;
        margin: 0 0 14px;
    }
    .related-list { display: flex; flex-direction: column; gap: 8px; }
    .related-link {
        display: block;
        padding: 10px 14px;
        background: #fff;
        border-radius: 8px;
        text-decoration: none;
        color: #1a2233;
        font-size: 0.95rem;
        border: 1px solid #e4e8ef;
        transition: all .2s;
    }
    .related-link:hover { border-color: #1F4E79; transform: translateX(4px); }
    .related-kw { color: #C9A96E; font-size: 0.85rem; margin-right: 8px; }
    .back-link {
        display: inline-block;
        margin: 40px 0 0;
        color: #1F4E79;
        text-decoration: none;
        font-size: 0.95rem;
    }
    .back-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<!-- Navbar -->
<header class="nav">
    <div class="container nav-inner">
        <a href="../" class="brand">{{AUTHOR_NAME}}</a>
        <nav class="nav-links">
            <a href="../#about">關於</a>
            <a href="../#topics">核心主題</a>
            <a href="../#articles">文章</a>
            <a href="../#contact">聯絡</a>
        </nav>
    </div>
</header>

<!-- Article Hero -->
<section class="article-hero">
    <div class="container">
        <div class="article-meta-top">{{DATE_DISPLAY}} · {{CATEGORY}}</div>
        <h1 class="article-title">{{TITLE}}</h1>
    </div>
</section>

<!-- Article Body -->
<article class="article-body">
    {{CONTENT_HTML}}
</article>

<!-- Article Footer -->
<div class="article-footer">
    <div class="article-footer-bio">
        <strong>關於作者</strong><br>
        {{AUTHOR_BIO}}
    </div>
    <a href="../" class="back-link">← 回首頁</a>
</div>

<!-- Footer -->
<footer class="footer">
    <div class="container">
        <p class="footer-bio">{{AUTHOR_BIO}}</p>
        <p class="footer-copy">© 2026 {{AUTHOR_NAME}}. All rights reserved.</p>
    </div>
</footer>

</body>
</html>
