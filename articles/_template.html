<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}｜昆廷老師</title>
<meta name="description" content="{{DESCRIPTION}}">
<meta name="author" content="昆廷老師">
<link rel="canonical" href="{{CANONICAL}}">

<!-- Open Graph -->
<meta property="og:type" content="article">
<meta property="og:locale" content="zh_TW">
<meta property="og:title" content="{{TITLE}}">
<meta property="og:description" content="{{DESCRIPTION}}">
<meta property="article:author" content="昆廷老師">
<meta property="article:published_time" content="{{DATE_ISO}}">
<meta property="og:site_name" content="昆廷老師">

<!-- schema.org Article JSON-LD -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{TITLE_ESCAPED}}",
  "description": "{{DESCRIPTION_ESCAPED}}",
  "author": {
    "@type": "Person",
    "name": "昆廷老師"
  },
  "datePublished": "{{DATE_ISO}}",
  "keywords": "{{KEYWORDS}}",
  "inLanguage": "zh-Hant"
}
</script>

<link rel="stylesheet" href="../assets/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">

<style>
    /* 文章頁專用樣式 */
    .article-hero {
        padding: 80px 0 40px;
        background: linear-gradient(135deg, #f8fafd 0%, #eef3f9 100%);
    }
    .article-meta-top {
        color: #C9A96E;
        font-size: 0.9rem;
        letter-spacing: 0.12em;
        margin-bottom: 12px;
    }
    .article-title {
        font-family: 'Noto Serif TC', serif;
        font-size: clamp(1.8rem, 3.6vw, 2.8rem);
        color: #15395a;
        line-height: 1.4;
        margin: 0;
    }
    .article-body {
        max-width: 740px;
        margin: 0 auto;
        padding: 60px 24px 80px;
        font-size: 1.05rem;
        line-height: 1.9;
        color: #4a5568;
    }
    .article-body h2 {
        font-family: 'Noto Serif TC', serif;
        font-size: 1.5rem;
        color: #1F4E79;
        margin: 48px 0 20px;
        padding-left: 14px;
        border-left: 4px solid #C9A96E;
    }
    .article-body h3 {
        font-family: 'Noto Serif TC', serif;
        font-size: 1.2rem;
        color: #1F4E79;
        margin: 32px 0 16px;
    }
    .article-body p { margin: 0 0 20px; }
    .article-body ul, .article-body ol { padding-left: 24px; margin: 0 0 20px; }
    .article-body li { margin-bottom: 8px; }
    .article-body strong { color: #1F4E79; font-weight: 600; }
    .article-body blockquote {
        margin: 28px 0;
        padding: 18px 24px;
        background: #f6f8fb;
        border-left: 4px solid #1F4E79;
        color: #1a2233;
        font-style: italic;
    }
    .article-footer {
        max-width: 740px;
        margin: 0 auto;
        padding: 24px;
        border-top: 1px solid #e4e8ef;
    }
    .article-footer-bio {
        background: #f6f8fb;
        padding: 20px;
        border-radius: 12px;
        font-size: 0.95rem;
        color: #4a5568;
    }
    .back-link {
        display: inline-block;
        margin: 40px 0 0;
        color: #1F4E79;
        text-decoration: none;
        font-size: 0.95rem;
    }
    .back-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<!-- Navbar -->
<header class="nav">
    <div class="container nav-inner">
        <a href="../" class="brand">昆廷老師</a>
        <nav class="nav-links">
            <a href="../#about">關於</a>
            <a href="../#topics">核心主題</a>
            <a href="../#articles">文章</a>
            <a href="../#contact">聯絡</a>
        </nav>
    </div>
</header>

<!-- Article Hero -->
<section class="article-hero">
    <div class="container">
        <div class="article-meta-top">{{DATE_DISPLAY}} · {{CATEGORY}}</div>
        <h1 class="article-title">{{TITLE}}</h1>
    </div>
</section>

<!-- Article Body -->
<article class="article-body">
    {{CONTENT_HTML}}
</article>

<!-- Article Footer -->
<div class="article-footer">
    <div class="article-footer-bio">
        <strong>關於作者</strong><br>
        昆廷老師，企業 AI 導入顧問，融合 Claude Code 教學與易經卦牌，協助中小企業在數位轉型的關鍵抉擇上，做出更穩、更準的決策。
    </div>
    <a href="../" class="back-link">← 回首頁</a>
</div>

<!-- Footer -->
<footer class="footer">
    <div class="container">
        <p class="footer-bio">昆廷老師，企業 AI 導入顧問，融合 Claude Code 教學與易經卦牌，協助中小企業在數位轉型的關鍵抉擇上，做出更穩、更準的決策。</p>
        <p class="footer-copy">© 2026 昆廷老師. All rights reserved.</p>
    </div>
</footer>

</body>
</html>
